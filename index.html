<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Transcripción y Speakers - Voice Minutes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#195de6",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: max(884px, 100dvh);
        }

        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
    <div
        class="relative mx-auto min-h-screen max-w-[430px] bg-white dark:bg-slate-950 flex flex-col shadow-2xl overflow-hidden border-x border-slate-200 dark:border-slate-800">
        <!-- Status Bar Placeholder -->
        <div class="h-12 w-full flex justify-between items-center px-8 pt-4">
            <span class="text-sm font-semibold">9:41</span>
            <div class="flex gap-1.5 items-center">
                <span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
                <span class="material-symbols-outlined text-[18px]">wifi</span>
                <span class="material-symbols-outlined text-[18px]">battery_full</span>
            </div>
        </div>

        <!-- Header -->
        <header class="flex items-center p-4 justify-between border-b border-slate-100 dark:border-slate-800">
            <button
                class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back_ios</span>
            </button>
            <h1 class="text-lg font-bold tracking-tight" id="meeting-title">Cargando...</h1>
            <button
                class="flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined text-primary">ios_share</span>
            </button>
        </header>

        <!-- Search Area -->
        <div class="px-4 pt-4 pb-2">
            <div class="relative group">
                <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">search</span>
                <input
                    class="w-full bg-slate-100 dark:bg-slate-900 border-none rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/20 focus:bg-white dark:focus:bg-slate-800 transition-all outline-none"
                    placeholder="Buscar en la transcripción..." type="text" />
            </div>
        </div>

        <!-- Tabs -->
        <nav class="flex px-4 border-b border-slate-100 dark:border-slate-800">
            <a class="flex-1 py-3 text-center text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors"
                href="#">Resumen</a>
            <a class="flex-1 py-3 text-center text-sm font-bold text-primary border-b-2 border-primary"
                href="#">Transcripción</a>
            <a class="flex-1 py-3 text-center text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors"
                href="#">Speakers</a>
        </nav>

        <!-- Dynamic Content -->
        <main class="flex-1 overflow-y-auto px-4 py-4 space-y-6" id="transcript-container">
            <div class="text-center text-slate-500 text-sm mt-10">Conectando con el backend...</div>
        </main>

        <!-- Bottom Tab Bar -->
        <nav
            class="border-t border-slate-100 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 ios-blur flex justify-around pb-8 pt-3 mt-auto">
            <a class="flex flex-col items-center gap-1 text-slate-400" href="#"><span
                    class="material-symbols-outlined">mic</span><span
                    class="text-[10px] font-medium">Reuniones</span></a>
            <a class="flex flex-col items-center gap-1 text-primary" href="#"><span
                    class="material-symbols-outlined fill-1">description</span><span
                    class="text-[10px] font-medium">Transcripción</span></a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="#"><span
                    class="material-symbols-outlined">calendar_today</span><span
                    class="text-[10px] font-medium">Calendario</span></a>
            <a class="flex flex-col items-center gap-1 text-slate-400" href="#"><span
                    class="material-symbols-outlined">settings</span><span
                    class="text-[10px] font-medium">Ajustes</span></a>
        </nav>
    </div>

    <!-- SCRIPT DE CONEXIÓN AL BACKEND -->
    <script>
        // Configuración
        const API_BASE_URL = 'http://localhost:3000/v1';
        let accessToken = null;

        // Función para simular el login y obtener un token real de tu backend
        async function authenticate() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test@stitch.com' })
                });

                if (!response.ok) throw new Error('Falló el login');

                const data = await response.json();
                accessToken = data.access_token;
                console.log('Autenticación exitosa', data.user.name);

                // Una vez autenticado, cargamos los datos
                loadMeetingData();
            } catch (error) {
                console.error('Error de autenticación:', error);
                document.getElementById('transcript-container').innerHTML =
                    `<div class="text-red-500 text-sm text-center mt-10">Error de conexión con el backend: ${error.message}</div>`;
            }
        }

        // Función para cargar los datos de una reunión y su transcripción
        async function loadMeetingData() {
            const meetingId = 'm_1'; // ID simulado según tu app.js

            try {
                // 1. Cargar detalles de la reunión
                const meetingResponse = await fetch(`${API_BASE_URL}/meetings/${meetingId}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const meetingData = await meetingResponse.json();
                document.getElementById('meeting-title').innerText = meetingData.title;

                // 2. Cargar transcripciones
                const transcriptResponse = await fetch(`${API_BASE_URL}/meetings/${meetingId}/transcript`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const transcriptData = await transcriptResponse.json();

                // 3. Renderizar en la UI
                renderTranscript(transcriptData.segments);

            } catch (error) {
                console.error('Error cargando datos:', error);
            }
        }

        // Función para renderizar los segmentos en el HTML
        function renderTranscript(segments) {
            const container = document.getElementById('transcript-container');

            if (!segments || segments.length === 0) {
                container.innerHTML = '<div class="text-slate-500 text-center mt-10">No hay transcripciones disponibles.</div>';
                return;
            }

            // Generamos el HTML dinámicamente basado en los datos del backend
            const html = segments.map((seg, index) => {
                const initial = seg.speaker_name.charAt(0).toUpperCase();
                const timeString = new Date(seg.start_ms).toISOString().substr(11, 8); // Format ms to HH:mm:ss

                // Highlight the first segment just like in your original design
                const isHighlighted = index === 0;
                const wrapperClass = isHighlighted
                    ? 'group relative bg-primary/5 dark:bg-primary/10 -mx-4 px-4 py-4 border-l-4 border-primary'
                    : 'group px-0 py-2';

                const buttonClass = isHighlighted
                    ? 'text-[11px] font-semibold text-primary bg-primary/10 hover:bg-primary/20 px-3 py-1.5 rounded-full transition-colors'
                    : 'opacity-0 group-hover:opacity-100 text-[11px] font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-full transition-all';

                return `
                    <div class="${wrapperClass}">
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <div class="flex items-center justify-center size-8 rounded-full bg-primary text-white text-xs font-bold">${initial}</div>
                                <span class="font-semibold text-sm">${seg.speaker_name} (${seg.speaker_label})</span>
                                <span class="text-[10px] font-medium text-slate-400 bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded">${timeString}</span>
                            </div>
                            <button class="${buttonClass}" onclick="alert('Acción: Convirtiendo en decisión el texto de ${seg.speaker_name}.')">Convertir en decisión</button>
                        </div>
                        <p class="text-sm leading-relaxed text-slate-700 dark:text-slate-300">${seg.text}</p>
                    </div>
                `;
            }).join('');

            // Agregamos la tarjeta naranja al final
            container.innerHTML = html + `
                <div class="mt-8 p-4 bg-orange-50 dark:bg-orange-900/20 border border-orange-100 dark:border-orange-800/30 rounded-2xl">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="material-symbols-outlined text-orange-500">info</span>
                        <h3 class="text-sm font-bold text-orange-800 dark:text-orange-200">Gestión de Almacenamiento</h3>
                    </div>
                    <p class="text-xs text-orange-700 dark:text-orange-300 leading-relaxed mb-4">
                        Este audio se eliminará automáticamente pronto. La transcripción se mantendrá guardada.
                    </p>
                    <button class="w-full bg-white dark:bg-slate-800 text-orange-600 dark:text-orange-400 text-sm font-bold py-2.5 rounded-xl border border-orange-200 dark:border-orange-800 hover:bg-orange-100 transition-colors" onclick="alert('Acción: Borrando audio (Simulación)')">
                        Borrar audio ahora
                    </button>
                </div>
            `;
        }

        // Iniciar el proceso de autenticación y carga cuando termine de cargar la página
        window.addEventListener('DOMContentLoaded', () => {
            authenticate();
            setupInteractions();
        });

        // Configurar interacciones visuales
        function setupInteractions() {
            // Configurar pestañas superiores
            const tabs = document.querySelectorAll('nav.border-b a');
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    e.preventDefault();
                    tabs.forEach(t => {
                        t.className = 'flex-1 py-3 text-center text-sm font-medium text-slate-500 hover:text-slate-900 transition-colors';
                    });
                    tab.className = 'flex-1 py-3 text-center text-sm font-bold text-primary border-b-2 border-primary';

                    if (tab.innerText !== 'Transcripción') {
                        document.getElementById('transcript-container').innerHTML =
                            '<div class="text-slate-500 text-center mt-10">Vista de ' + tab.innerText + ' no implementada.</div>';
                    } else {
                        // Recargar transcripción si volvemos a la pestaña
                        document.getElementById('transcript-container').innerHTML = '<div class="text-slate-500 text-center mt-10">Cargando transcripción...</div>';
                        loadMeetingData();
                    }
                });
            });

            // Configurar pestañas inferiores
            const bottomTabs = document.querySelectorAll('nav.border-t a');
            bottomTabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    e.preventDefault();
                    bottomTabs.forEach(t => {
                        t.className = 'flex flex-col items-center gap-1 text-slate-400';
                        t.querySelector('.material-symbols-outlined').classList.remove('fill-1');
                    });
                    tab.className = 'flex flex-col items-center gap-1 text-primary';
                    tab.querySelector('.material-symbols-outlined').classList.add('fill-1');
                });
            });

            // Configurar otros botones estáticos
            const allStaticButtons = document.querySelectorAll('header button, .bg-slate-900 button');
            allStaticButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    alert('Esta es una vista previa. Función no conectada a esta demo.');
                });
            });
        }
    </script>
</body>

</html>
